version: 2
updates:
  # npm dependencies: @sap-ai-sdk/* runtime SDKs and the pinned @earendil-works/*
  # pi packages (peer deps are "*", so the concrete version lives in devDependencies).
  # Grouped so related bumps arrive as one PR instead of many.
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      sap-ai-sdk:
        patterns:
          - "@sap-ai-sdk/*"
      pi:
        patterns:
          - "@earendil-works/*"

  # Keep workflow actions (checkout, setup-node, ...) current so they don't drift
  # onto deprecated runtimes.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci(deps)"
