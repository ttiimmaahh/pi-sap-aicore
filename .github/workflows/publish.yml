name: Publish

# Tag-driven release. Bump the version locally with `npm version <patch|minor|major>`
# (which commits package.json + tags vX.Y.Z), then `git push --follow-tags`.
# This workflow fires on the v* tag, verifies the tag matches package.json,
# typechecks, and publishes to npm.
#
# Auth is npm Trusted Publishing via OIDC — NO token. The package must have this
# repo + workflow registered as a Trusted Publisher on npmjs.com (one-time setup;
# see README "Releasing"). npm detects the OIDC environment automatically and
# emits provenance attestations by default (no --provenance flag needed).

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing requires npm CLI >= 11.5.1.
      - name: Update npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      # Fail loud if the tag and package.json disagree, so we never publish a
      # version that doesn't match the ref it was cut from. Reads the tag from
      # the GITHUB_REF_NAME env var (not ${{ }} interpolation) — no injection.
      - name: Verify tag matches package.json version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          pkg_version="$(node -p "require('./package.json').version")"
          echo "tag=${tag_version} package.json=${pkg_version}"
          if [ "${tag_version}" != "${pkg_version}" ]; then
            echo "::error::Tag v${tag_version} does not match package.json version ${pkg_version}"
            exit 1
          fi

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Publish to npm
        run: npm publish
